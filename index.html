<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVER:EDGE — 더블 크로스 통합 DB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic+Coding:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="scanlines" aria-hidden="true"></div>
<div class="crack-overlay" aria-hidden="true"></div>

<!-- ===================== 인트로 : 보안 파일 접속 화면 ===================== -->
<section id="intro" class="intro">
  <div class="intro-inner">
    <div class="intro-log" id="intro-log" aria-live="polite"></div>

    <button id="seal-btn" class="seal-btn" type="button" aria-label="인장을 눌러 파일 시스템에 접속">
      <svg class="seal-svg" viewBox="0 0 220 220" aria-hidden="true">
        <circle class="seal-ring-outer" cx="110" cy="110" r="98" />
        <circle class="seal-ring-ticks" cx="110" cy="110" r="86" />
        <circle class="seal-ring-inner" cx="110" cy="110" r="70" />
        <line class="seal-cross" x1="68" y1="68" x2="152" y2="152" />
        <line class="seal-cross" x1="152" y1="68" x2="68" y2="152" />
      </svg>
      <span class="seal-label">진입</span>
    </button>

    <p class="intro-hint" id="intro-hint">SEQUENCE 실행 중…</p>
  </div>
</section>

<!-- ===================== 메인 : DB 파일 브라우저 ===================== -->
<div id="app-root" class="app-root" aria-hidden="true">

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 40 40" width="40" height="40">
          <circle cx="20" cy="20" r="17" />
          <line x1="9" y1="9" x2="31" y2="31" />
          <line x1="31" y1="9" x2="9" y2="31" />
        </svg>
      </span>
      <div class="brand-text">
        <h1>OVER<span class="edge">:</span>EDGE</h1>
        <p class="tagline">// ARCHIVE_ACCESS :: 더블 크로스 통합 데이터베이스</p>
      </div>
    </div>
    <div class="header-meta">
      <span class="pulse-dot" aria-hidden="true"></span>
      <span id="record-count" class="record-count">0 FILES</span>
    </div>
  </div>

  <nav class="tab-nav" id="tab-nav" aria-label="데이터 분류">
    <!-- tabs injected by JS -->
  </nav>
</header>

<main class="site-main">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="prompt-caret" aria-hidden="true">&gt;</span>
      <input type="text" id="search-input" placeholder="이름, 효과, 태그로 검색…" autocomplete="off">
    </div>
    <div class="status" id="status-line">불러오는 중…</div>
  </div>

  <section class="table-section" id="table-section">
    <table id="data-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
    <p class="empty-state" id="empty-state" hidden>일치하는 항목이 없습니다.<br><span>검색어를 확인하거나 다른 분류를 선택해 보세요.</span></p>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>데이터는 <code>/data/*.csv</code> 파일을 편집해 갱신합니다.</span>
    <span class="x-divider" aria-hidden="true">×</span>
    <span>더블 크로스 The Animation은 각 판권사의 상표입니다. 팬 제작 자료입니다.</span>
  </div>
</footer>

</div><!-- /#app-root -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/intro.js"></script>
</body>
</html>
