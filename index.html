<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVER:EDGE — 더블 크로스 통합 DB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic+Coding:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="scanlines" aria-hidden="true"></div>
<div class="crack-overlay" aria-hidden="true"></div>

<!-- ===================== 인트로 : 보안 파일 접속 화면 ===================== -->
<section id="intro" class="intro">
  <div class="intro-inner">
    <div class="intro-log" id="intro-log" aria-live="polite"></div>

    <button id="seal-btn" class="seal-btn" type="button" aria-label="신원 인증 후 파일 시스템 접속">
      <svg class="seal-svg" viewBox="0 0 240 240" aria-hidden="true">
        <defs>
          <clipPath id="scanClip">
            <rect x="24" y="24" width="192" height="192" rx="4" />
          </clipPath>
        </defs>

        <!-- HUD 코너 브라켓 -->
        <g class="seal-brackets">
          <path d="M 28 4 L 4 4 L 4 28" />
          <path d="M 212 4 L 236 4 L 236 28" />
          <path d="M 28 236 L 4 236 L 4 212" />
          <path d="M 212 236 L 236 236 L 236 212" />
        </g>

        <!-- 파일 프레임 -->
        <rect class="seal-frame" x="24" y="24" width="192" height="192" rx="4" />

        <!-- 기밀 스탬프 -->
        <g class="seal-stamp" transform="rotate(-16 178 54)">
          <rect x="140" y="40" width="76" height="26" rx="2" />
          <text x="178" y="58" text-anchor="middle">CLASSIFIED</text>
        </g>

        <!-- 신분증 픽토그램 -->
        <g class="seal-idcard">
          <rect x="74" y="90" width="92" height="60" rx="6" />
          <rect class="seal-idcard-photo" x="86" y="102" width="22" height="22" rx="2" />
          <line x1="116" y1="108" x2="158" y2="108" />
          <line x1="116" y1="120" x2="150" y2="120" />
          <line x1="116" y1="132" x2="140" y2="132" />
        </g>

        <!-- 인증 완료 체크 -->
        <path class="seal-check" d="M 96 122 L 114 140 L 148 100" />

        <!-- 스캔 라인 -->
        <rect class="seal-scanline" x="24" y="24" width="192" height="5" clip-path="url(#scanClip)" />
      </svg>
      <span class="seal-label">ACCESS</span>
    </button>

    <p class="intro-hint" id="intro-hint">SEQUENCE 실행 중…</p>
  </div>
</section>

<!-- ===================== 메인 : DB 파일 브라우저 ===================== -->
<div id="app-root" class="app-root" aria-hidden="true">

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 40 40" width="40" height="40">
          <circle cx="20" cy="20" r="17" />
          <line x1="9" y1="9" x2="31" y2="31" />
          <line x1="31" y1="9" x2="9" y2="31" />
        </svg>
      </span>
      <div class="brand-text">
        <h1>OVER<span class="edge">:</span>EDGE</h1>
        <p class="tagline">// ARCHIVE_ACCESS :: 더블 크로스 통합 데이터베이스</p>
      </div>
    </div>
    <div class="header-meta">
      <span class="pulse-dot" aria-hidden="true"></span>
      <span id="record-count" class="record-count">0 FILES</span>
    </div>
  </div>

  <nav class="tab-nav" id="tab-nav" aria-label="데이터 분류">
    <!-- tabs injected by JS -->
  </nav>
</header>

<main class="site-main">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="prompt-caret" aria-hidden="true">&gt;</span>
      <input type="text" id="search-input" placeholder="이름, 효과, 태그로 검색…" autocomplete="off">
    </div>
    <div class="status" id="status-line">불러오는 중…</div>
  </div>

  <section class="table-section" id="table-section">
    <table id="data-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
    <p class="empty-state" id="empty-state" hidden>일치하는 항목이 없습니다.<br><span>검색어를 확인하거나 다른 분류를 선택해 보세요.</span></p>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>데이터는 <code>/data/*.csv</code> 파일을 편집해 갱신합니다.</span>
    <span class="x-divider" aria-hidden="true">×</span>
    <span>더블 크로스 The Animation은 각 판권사의 상표입니다. 팬 제작 자료입니다.</span>
  </div>
</footer>

</div><!-- /#app-root -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/intro.js"></script>
</body>
</html>
