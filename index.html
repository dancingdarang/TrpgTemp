<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVER:EDGE — 더블 크로스 통합 DB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic+Coding:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="crack-overlay" aria-hidden="true"></div>

<!-- ===================== 인트로 : 보안 파일 접속 화면 ===================== -->
<section id="intro" class="intro">
  <div class="term-panel">
    <div class="term-header">
      <span class="term-icon" aria-hidden="true">V</span>
      <span class="term-title">OVEREDGE_NET_CORE</span>
      <span class="term-status-dot" aria-hidden="true"></span>
    </div>
    <div class="term-divider"></div>

    <div class="term-log" id="intro-log" aria-live="polite"></div>

    <div class="term-footer-row">
      <span>AUTH_ID: <span class="term-value">GUEST</span></span>
      <span>KEY: <span class="term-value">••••-••••</span></span>
    </div>

    <button id="seal-btn" class="term-btn" type="button">ACCESS</button>
  </div>
</section>

<!-- ===================== 메인 : DB 파일 브라우저 ===================== -->
<div id="app-root" class="app-root" aria-hidden="true">

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 40 40" width="40" height="40">
          <circle cx="20" cy="20" r="17" />
          <line x1="9" y1="9" x2="31" y2="31" />
          <line x1="31" y1="9" x2="9" y2="31" />
        </svg>
      </span>
      <div class="brand-text">
        <h1>OVER<span class="edge">:</span>EDGE</h1>
        <p class="tagline">// ARCHIVE_ACCESS :: 더블 크로스 통합 데이터베이스</p>
      </div>
    </div>
    <div class="header-meta">
      <span class="pulse-dot" aria-hidden="true"></span>
      <span id="record-count" class="record-count">0 FILES</span>
    </div>
  </div>

  <nav class="tab-nav" id="tab-nav" aria-label="데이터 분류">
    <!-- tabs injected by JS -->
  </nav>
</header>

<main class="site-main">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="prompt-caret" aria-hidden="true">&gt;</span>
      <input type="text" id="search-input" placeholder="이름, 효과, 태그로 검색…" autocomplete="off">
    </div>
    <div class="status" id="status-line">불러오는 중…</div>
  </div>

  <div class="chip-filter" id="chip-filter" hidden></div>

  <div class="expand-controls" id="expand-controls" hidden>
    <button type="button" id="expand-all-btn" class="link-btn">전체 펼치기</button>
    <span class="expand-divider" aria-hidden="true">|</span>
    <button type="button" id="collapse-all-btn" class="link-btn">전체 접기</button>
  </div>

  <section class="table-section" id="table-section">
    <table id="data-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="entry-list" id="entry-list" hidden></div>
    <p class="empty-state" id="empty-state" hidden>일치하는 항목이 없습니다.<br><span>검색어를 확인하거나 다른 분류를 선택해 보세요.</span></p>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>데이터는 <code>/data/*.csv</code> 파일을 편집해 갱신합니다.</span>
    <span class="x-divider" aria-hidden="true">×</span>
    <span>더블 크로스 The Animation은 각 판권사의 상표입니다. 팬 제작 자료입니다.</span>
  </div>
</footer>

</div><!-- /#app-root -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/intro.js"></script>
</body>
</html>
